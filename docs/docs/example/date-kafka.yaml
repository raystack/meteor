name: bigquery-kafka-recipe
version: v1beta1
source:
  name: bigquery
  scope: my-bigquery
  config:
    project_id: "{{ .bigquery_project_id }}"
    include_column_profile: true
sinks:
  - name: kafka
    config:
      brokers: localhost:9092
      topic: metadata-stream
      key_path: ".resource.urn"
