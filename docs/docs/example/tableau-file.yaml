name: tableau-to-file
version: v1beta1
source:
  name: tableau
  scope: my-tableau
  config:
    host: "{{ .tableau_host }}"
    version: "3.12"
    identifier: my-tableau
    username: "{{ .tableau_username }}"
    password: "{{ .tableau_password }}"
sinks:
  - name: file
    config:
      path: "./output/tableau-metadata.json"
      format: "json"
