name: postgres-to-compass
version: v1beta1
source:
  name: postgres
  scope: my-postgres
  config:
    connection_url: "postgres://{{ .pg_user }}:{{ .pg_password }}@{{ .pg_host }}:5432/{{ .pg_database }}?sslmode=disable"
processors:
  - name: labels
    config:
      labels:
        source: meteor
        environment: production
sinks:
  - name: compass
    config:
      host: "{{ .compass_host }}"
      type: table
      mapping:
        id: "resource.urn"
        displayName: "resource.name"
