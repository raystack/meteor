name: bigquery-multi-sink
version: v1beta1
source:
  name: bigquery
  scope: my-bigquery
  config:
    project_id: "{{ .bigquery_project_id }}"
    include_column_profile: true
    build_view_lineage: true
processors:
  - name: enrich
    config:
      attributes:
        team: data-platform
  - name: labels
    config:
      labels:
        source: meteor
        environment: production
sinks:
  - name: compass
    config:
      host: "{{ .compass_host }}"
  - name: kafka
    config:
      brokers: "{{ .kafka_brokers }}"
      topic: metadata-events
      key_path: ".Urn"
